<title>한끼통살 · 자사몰 공헌이익</title>
<style>
/* 라이트 전용 — 정합성 비교 대시보드(roas-compare)와 동일 톤 */
:root{
  --ground:#f0f2f7; --card:#ffffff; --ink:#1e2333; --ink2:#4a5478; --muted:#8a91a8;
  --line:#dde0ea; --line2:#eef0f6; --accent:#4466cc; --accent-soft:#eef2ff;
  --good:#2e7d32; --good-bg:#e8f5e9; --bad:#c62828; --bad-bg:#fdecea;
  --warn:#e65100; --warn-bg:#fff3e0;
  --sel:#4466cc; --sel-bg:#e9eeff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;
  background:var(--ground);color:var(--ink);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
/* topbar (roas-compare와 동일 톤) */
.topbar{background:#1e2333;padding:0 26px;height:62px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:60}
.topbar-logo{font-size:20px;font-weight:800;color:#fff}
.topbar-sub{font-size:14px;color:rgba(255,255,255,.5)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tb-back{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border:1.5px solid rgba(255,255,255,.25);border-radius:9px;background:transparent;color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:.12s}
.tb-back:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.5)}
.tb-updated{font-size:12px;color:rgba(255,255,255,.5)}
.wrap{max-width:1560px;margin:0 auto;padding:24px 20px 60px}

/* layout */
.grid{display:grid;grid-template-columns:216px 1fr;gap:18px;align-items:start}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

/* rail */
.rail{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;position:sticky;top:14px}
@media(max-width:900px){.rail{position:static}}
.rail-h{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.base-tog{display:flex;gap:4px;margin-bottom:12px;background:var(--ground);padding:3px;border-radius:9px}
.base-tog button{flex:1;padding:6px 4px;border:none;background:transparent;color:var(--muted);font-size:11.5px;font-weight:700;border-radius:6px;cursor:pointer;font-family:inherit}
.base-tog button.on{background:var(--accent);color:#fff}
.dlist{display:flex;flex-direction:column;gap:2px;max-height:560px;overflow-y:auto;margin:0 -4px;padding:0 4px}
.drow{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .1s}
.drow:hover{background:var(--accent-soft)}
.drow.sel{background:var(--sel-bg);box-shadow:inset 2px 0 0 var(--sel)}
.dbox{width:14px;height:14px;border:1.5px solid var(--line);border-radius:4px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.drow.sel .dbox{background:var(--sel);border-color:var(--sel)}
.dd-date{font-size:13px;font-weight:700;color:var(--ink);min-width:42px}
.dd-dow{font-size:11px;color:var(--muted)}
.dd-mini{margin-left:auto;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%}
.dot.bad{background:var(--bad)}.dot.warn{background:var(--warn)}.dot.good{background:var(--good)}.dot.flat{background:var(--line)}
.dd-cp{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.rail-clear{margin-top:10px;width:100%;padding:7px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit}
.rail-clear:hover{border-color:var(--accent);color:var(--accent)}

/* kpi */
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
@media(max-width:1180px){.kpi{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.kpi{grid-template-columns:1fr}}
.k{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:17px 19px}
.k.dark{background:var(--ink);border-color:var(--ink)}.k.acc{background:var(--accent);border-color:var(--accent)}
.k.dark .kl,.k.acc .kl{color:rgba(255,255,255,.6)}.k.dark .kv,.k.acc .kv{color:#fff}.k.dark .ks,.k.acc .ks{color:rgba(255,255,255,.55)}
.kl{font-size:11.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kv{font-size:23px;font-weight:800;letter-spacing:-.5px;line-height:1.12;color:var(--ink)}
.kv small{font-size:14px;font-weight:700;opacity:.7;margin-left:2px}
.ks{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.45}
.split{display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.15)}
.k:not(.dark):not(.acc) .split{border-top-color:var(--line2)}
.sp{flex:1}.sp-l{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:rgba(255,255,255,.5)}
.k:not(.dark):not(.acc) .sp-l{color:var(--muted)}.sp-v{font-size:13.5px;font-weight:700;color:#fff;margin-top:1px}
.k:not(.dark):not(.acc) .sp-v{color:var(--ink)}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:18px}
.ct{font-size:15.5px;font-weight:800;display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:4px}
.badge{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:6px;background:var(--accent-soft);color:var(--accent)}
.cd{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.5}

/* waterfall */
.wf{display:flex;align-items:flex-end;gap:5px;height:172px;margin-bottom:6px}
.wfc{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;min-width:0}
.wfv{font-size:12px;font-weight:800;text-align:center;margin-bottom:5px;color:var(--ink2);white-space:nowrap}
.wfb{border-radius:4px 4px 0 0;width:100%}
.wfl{font-size:11px;text-align:center;margin-top:7px;color:var(--muted);font-weight:700;line-height:1.3}
.wfl b{display:block;color:var(--ink2);font-size:11.5px}
.wfarrow{flex:0 0 14px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;padding-bottom:30px}

/* legend */
.legend{background:var(--ground);border-radius:9px;padding:11px 14px;margin-bottom:14px;font-size:12px;color:var(--ink2);line-height:1.7}
.legend b{color:var(--ink)}
.lchip{display:inline-block;font-size:11px;font-weight:800;padding:2px 7px;border-radius:12px;margin:0 2px}

/* table */
.tw{overflow-x:auto;margin:0 -4px}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:940px}
th{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);text-align:right;padding:8px 9px;border-bottom:1.5px solid var(--line);white-space:nowrap}
th.l{text-align:left}
td{padding:8px 9px;text-align:right;border-bottom:1px solid var(--line2);white-space:nowrap;color:var(--ink2)}
td.l{text-align:left}
tbody tr.main{cursor:pointer;transition:background .1s}
tbody tr.main:hover{background:var(--accent-soft)}
tbody tr.main.open,tbody tr.main.hl{background:var(--sel-bg)}
.dt{font-weight:800;color:var(--ink)}.dow{color:var(--muted);font-weight:600;font-size:11px;margin-left:4px}
.pri{font-weight:800;color:var(--ink)}
.chip{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:12px;letter-spacing:.2px}
.chip.bad{background:var(--bad-bg);color:var(--bad)}.chip.good{background:var(--good-bg);color:var(--good)}
.chip.warn{background:var(--warn-bg);color:var(--warn)}.chip.flat{background:var(--line2);color:var(--muted)}
.chip.sm{font-size:10px;padding:1px 6px}
.caret{display:inline-block;width:13px;color:var(--muted);font-size:10px}
.up{color:var(--good);font-weight:800}.dn{color:var(--bad);font-weight:800}

/* drilldown */
.dd{background:var(--ground);border:1px solid var(--line);border-radius:10px;padding:17px 19px;margin:3px 0 11px}
.ddh{font-size:13.5px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lv{margin-bottom:16px}.lv:last-child{margin-bottom:0}
.lvt{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.lvt .n{width:17px;height:17px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.eq{font-size:13px;line-height:1.9;color:var(--ink2)}
.eq .hl{font-weight:800;color:var(--ink)}
.contrib{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.cbox{flex:1;min-width:170px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 13px}
.cbox.main{border-color:var(--bad);border-width:1.5px}
.cbox-l{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.cbox-v{font-size:18px;font-weight:800;margin-top:2px;color:var(--ink)}
.cbox-s{font-size:11.5px;color:var(--muted);margin-top:2px}
.mini{width:100%;border-collapse:collapse;font-size:12px;min-width:640px}
.mini th{font-size:10px;padding:5px 7px}.mini td{padding:5px 7px}
.reason{background:var(--card);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;padding:9px 13px;font-size:12.5px;color:var(--ink2);line-height:1.6;margin-top:8px}
.reason b{color:var(--ink)}
.gapflag{background:var(--warn-bg);border-radius:7px;padding:9px 13px;font-size:12px;color:var(--ink2);line-height:1.6;margin-top:8px}
.gapflag b{color:var(--warn)}
.blocked{background:var(--warn-bg);border:1px dashed var(--warn);border-radius:8px;padding:11px 14px;font-size:12px;color:var(--ink2);line-height:1.55}
.blocked b{color:var(--warn)}
.foot{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.6}
</style>

const ROWS=D.rows, AVG=D.avg, DOWA=D.dowavg, BR=D.baseRet;
let baseMode='avg', sel=[];
const won=n=>Math.round(n).toLocaleString('ko-KR');

const pct=n=>n.toFixed(2)+'%';
const sgn=n=>(n>=0?'+':'')+n.toFixed(2);
const md=d=>d.slice(5).replace('-','/');
function baseOf(r){return baseMode==='dow'?DOWA[r.dow]:AVG;}

/* ── 진단 ── */
function diagMargin(r){
  const b=baseOf(r), dw=r.w-b.w, dg=r.g-b.g, di=r.i-b.i;
  const cause=Math.abs(dw)>Math.abs(dg)?'원가율':'광고효율';
  let cls='flat',txt='평균권';
  if(di<=-2.5){cls='bad';txt='⚠ '+cause;}
  else if(di<=-1.2){cls='warn';txt='△ '+cause;}
  else if(di>=2.5){cls='good';txt='◎ '+cause+' 양호';}
  else if(di>=1.2){cls='good';txt='○ 양호';}
  return {cls,txt,dw,dg,di,cause};
}
function diagVol(r){
  const b=baseOf(r), dc=(r.cp/b.cp-1)*100;
  let cls='flat',txt='—';
  if(dc<=-18){cls='bad';txt='공헌이익 급감';}
  else if(dc<=-8){cls='warn';txt='공헌이익 저조';}
  else if(dc>=18){cls='good';txt='공헌이익 급증';}
  else if(dc>=8){cls='good';txt='공헌이익 호조';}
  return {cls,txt,dc};
}
function diagGap(r){
  let worst=null;
  r.ch.forEach(c=>{
    if(c.derived||!c.ret||!BR[c.n]||c.s<600000) return;
    const dev=c.ret-BR[c.n];
    if(dev<-12 && (!worst||dev<worst.dev)) worst={n:c.n,ret:c.ret,base:BR[c.n],dev,mroas:c.mroas,croas:c.croas};
  });
  return worst;
}

function renderRail(){
  const el=document.getElementById('dlist'); el.innerHTML='';
  ROWS.forEach((r,i)=>{

    el.insertAdjacentHTML('beforeend',
      `<div class="drow ${on?'sel':''}" onclick="toggleSel(${i})">
        <div class="dbox">${on?'✓':''}</div>
        <span class="dd-date num">${md(r.d)}</span><span class="dd-dow">${r.dow}</span>
        <span class="dd-mini"><span class="dot ${m.cls}"></span><span class="dd-cp num">${(r.cp/1e6).toFixed(1)}M</span></span>
      </div>`);
  });
}
function toggleSel(i){const k=sel.indexOf(i); if(k>=0)sel.splice(k,1); else sel.push(i); sel.sort((a,b)=>a-b); renderRail(); renderMain();}
function clearSel(){sel=[]; renderRail(); renderMain();}
function setBase(m){baseMode=m; document.getElementById('bt-avg').classList.toggle('on',m==='avg'); document.getElementById('bt-dow').classList.toggle('on',m==='dow'); renderRail(); renderMain();}

/* ── 메인 ── */

function waterfall(NET,COST,FEE,SHIP,AD,CP){
  const steps=[
    {l:'순매출',s:'',v:NET,h:NET,c:'#c3c9da',top:0},
    {l:'원가',s:(COST/NET*100).toFixed(1)+'%',v:-COST,h:COST,c:'#8a91a8',top:NET-COST},
    {l:'운영수수료',s:'3.75% 고정',v:-FEE,h:FEE,c:'#a8b0c6',top:NET-COST-FEE},
    {l:'운반비',s:'11.32% 고정',v:-SHIP,h:SHIP,c:'#a8b0c6',top:NET-COST-FEE-SHIP},
    {l:'광고비',s:(AD/NET*100).toFixed(1)+'%',v:-AD,h:AD,c:'var(--accent)',top:NET-COST-FEE-SHIP-AD},
    {l:'공헌이익',s:(CP/NET*100).toFixed(2)+'%',v:CP,h:CP,c:'var(--good)',top:0}];
  let html='<div class="wf">';
  steps.forEach((s,i)=>{
    if(i>0)html+='<div class="wfarrow">→</div>';
    const hpx=Math.max(5,s.h/NET*120), base=(s.l==='순매출'||s.l==='공헌이익')?0:s.top/NET*120;
    html+=`<div class="wfc"><div class="wfv num">${s.v<0?'−':''}${eok(Math.abs(s.v))}</div>
      <div class="wfb" style="height:${hpx}px;background:${s.c};margin-bottom:${base}px"></div>
      <div class="wfl"><b>${s.l}</b>${s.s}</div></div>`;
  });
  return html+'</div>';
}

function bindTable(){
  const tb=document.getElementById('tb'); if(!tb)return; tb.innerHTML='';
  ROWS.forEach((r,i)=>{
    const m=diagMargin(r), g=diagGap(r);
    const croas=r.c24/r.ad*100, nroas=r.net/r.ad*100;
    const gapchip=g?`<span class="chip warn sm">${g.n} ▼${Math.abs(g.dev).toFixed(0)}p</span>`:'<span style="color:var(--muted)">·</span>';
    tb.insertAdjacentHTML('beforeend',
      `<tr class="main ${sel.includes(i)?'hl':''}" id="r${i}" onclick="clickRow(${i})">
        <td class="l"><span class="caret" id="c${i}">▸</span><span class="dt num">${md(r.d)}</span><span class="dow">${r.dow}</span></td>
        <td class="num">${won(r.net)}</td><td class="num">${won(r.ad)}</td>
        <td class="num">${croas.toFixed(0)}%</td><td class="num">${nroas.toFixed(0)}%</td>
        <td class="num">${pct(r.w)}</td><td class="num">${pct(r.g)}</td>
        <td class="num pri">${pct(r.i)}</td><td class="num">${won(r.cp)}</td>
        <td class="l"><span class="chip ${m.cls}">${m.txt}</span></td>
        <td class="l">${gapchip}</td></tr>
      <tr id="d${i}" style="display:none"><td colspan="11" style="padding:0;background:transparent"></td></tr>`);
  });
}
function clickRow(i){const r=document.getElementById('d'+i); openRow(i, r.style.display!=='none');}
function openRow(i,close){
  document.querySelectorAll('[id^="d"]').forEach(x=>{if(/^d\d+$/.test(x.id))x.style.display='none'});
  document.querySelectorAll('[id^="c"]').forEach(x=>{if(/^c\d+$/.test(x.id))x.textContent='▸'});
  document.querySelectorAll('tr.main').forEach(x=>x.classList.remove('open'));
  if(close)return;
  const row=document.getElementById('d'+i);
  row.style.display=''; document.getElementById('c'+i).textContent='▾';
  document.getElementById('r'+i).classList.add('open');
  row.firstElementChild.innerHTML=drill(ROWS[i]);
}

/* ── 드릴다운 ── */
function drill(r){
  const b=baseOf(r), m=diagMargin(r), share=Math.abs(m.dw)+Math.abs(m.dg);
  const nroas=r.net/r.ad*100, dnet=(r.net/b.net-1)*100;
  const chSorted=[...r.ch].sort((a,b)=>b.s-a.s);
  const chRows=chSorted.map(c=>{
    const dev=(!c.derived&&c.ret&&BR[c.n])?c.ret-BR[c.n]:null;
    const rc=c.croas<200?'var(--bad)':c.croas<400?'var(--warn)':'var(--good)';
    const dc=dev===null?'':(dev<-8?'style="color:var(--bad);font-weight:800"':dev>8?'style="color:var(--good);font-weight:800"':'style="color:var(--muted)"');
    const retCell=c.derived?'<span style="color:var(--muted)">실측기반</span>':(c.ret===null?'—':c.ret+'%');
    return `<tr><td class="l" style="font-weight:700;color:var(--ink)">${c.n}${c.derived?' <span style="font-size:9.5px;color:var(--muted);font-weight:600">파생</span>':''}</td>
      <td class="num">${won(c.s)}</td><td class="num">${won(c.mr)}</td><td class="num">${won(c.cr)}</td>
      <td class="num" style="color:var(--muted)">${c.mroas}%</td>
      <td class="num" style="color:${rc};font-weight:800">${c.croas}%</td>
      <td class="num" ${dc}>${retCell}</td>
      <td class="num" ${dc}>${dev===null?'—':(dev>=0?'+':'')+dev.toFixed(0)+'p'}</td></tr>`;
  }).join('');
  const gaps=r.ch.filter(c=>!c.derived&&c.ret&&BR[c.n]&&c.s>=600000&&(c.ret-BR[c.n])<-10).sort((a,b)=>(a.ret-BR[a.n])-(b.ret-BR[b.n]));
  const gapBlock=gaps.length?`<div class="gapflag">⚠ <b>매체 과대보고 의심</b> — ${gaps.map(c=>`<b>${c.n}</b>는 매체 ROAS ${c.mroas}% 보고했지만 Cafe24 실측 ${c.croas}%, 귀속률 ${c.ret}%로 평소(${BR[c.n]}%)보다 ${Math.abs(c.ret-BR[c.n]).toFixed(0)}%p 낮음`).join(' · ')}. 라스트터치 기준 실제 기여는 매체 지표보다 낮았을 가능성.</div>`:'<div class="reason">매체–실측 귀속률이 전 채널 평소 수준. 과대보고 신호 없음.</div>';

  return `<div class="dd">
    <div class="ddh">${md(r.d)} (${r.dow}) 원인 분해 <span class="chip ${m.cls}">${m.txt}</span>
      <span style="font-weight:600;color:var(--muted);font-size:12px">기준: ${baseMode==='avg'?'월평균':r.dow+'요일 평균 (n='+b.n+')'}</span></div>

    <div class="lv"><div class="lvt"><span class="n">1</span>이익률은 두 변수로만 결정</div>
      <div class="eq">이익률 <span class="hl num">${pct(r.i)}</span> = 84.93% − 원가율 <span class="hl num">${pct(r.w)}</span> − 광고비비중 <span class="hl num">${pct(r.g)}</span>
        &nbsp;·&nbsp; 기준 대비 <span class="${m.di<0?'dn':'up'} num">${sgn(m.di)}%p</span></div>
      <div class="contrib">
        <div class="cbox ${m.cause==='원가율'?'main':''}"><div class="cbox-l">원가율 기여</div>
          <div class="cbox-v num" style="color:${m.dw>0?'var(--bad)':'var(--good)'}">${sgn(-m.dw)}%p</div>
          <div class="cbox-s num">${pct(r.w)} vs 기준 ${pct(b.w)} · 설명력 ${(Math.abs(m.dw)/share*100||0).toFixed(0)}%</div></div>
        <div class="cbox ${m.cause==='광고효율'?'main':''}"><div class="cbox-l">광고비비중 기여</div>
          <div class="cbox-v num" style="color:${m.dg>0?'var(--bad)':'var(--good)'}">${sgn(-m.dg)}%p</div>
          <div class="cbox-s num">${pct(r.g)} vs 기준 ${pct(b.g)} · 설명력 ${(Math.abs(m.dg)/share*100||0).toFixed(0)}%</div></div>
      </div>
    </div>

    <div class="lv"><div class="lvt"><span class="n">2</span>광고비비중은 분자·분모 어디서</div>
      <div class="contrib">
        <div class="cbox"><div class="cbox-l">순매출 (분모)</div><div class="cbox-v num">${won(r.net)}</div>
          <div class="cbox-s">기준 대비 <b class="num ${dnet>=0?'up':'dn'}">${sgn(dnet)}%</b></div></div>
        <div class="cbox"><div class="cbox-l">광고비 (분자)</div><div class="cbox-v num">${won(r.ad)}</div>
          <div class="cbox-s">퍼포 ${won(r.perf)} · CRM ${won(r.crm)}</div></div>
        <div class="cbox"><div class="cbox-l">순 ROAS</div><div class="cbox-v num" style="color:${nroas<400?'var(--bad)':'var(--good)'}">${nroas.toFixed(1)}%</div>
          <div class="cbox-s">= 광고비비중의 역수</div></div>
      </div>
      <div class="reason">순ROAS와 광고비비중은 <b>역수 관계</b>. 순ROAS가 크게 빠져 보여도 (예: −13%p) 광고비도 함께 줄이면 광고비비중은 소폭(예: +0.5%p)만 올라 <b>이익률 영향은 작습니다</b>. 이익률은 비율이라 매출 규모가 아니라 효율에 반응합니다.</div>
    </div>

    <div class="lv"><div class="lvt"><span class="n">3</span>채널 그룹별 — 어디서 냈고 어디로 샜나 (UTM)</div>
      <div class="contrib">
        <div class="cbox"><div class="cbox-l">퍼포먼스</div><div class="cbox-v num" style="color:var(--warn)">${r.gp.perf.roas.toFixed(0)}%</div>
          <div class="cbox-s num">광고 ${won(r.gp.perf.s)} → 매출 ${won(r.gp.perf.r)}</div></div>
        <div class="cbox"><div class="cbox-l">CRM (문자)</div><div class="cbox-v num" style="color:var(--good)">${r.gp.crm.roas.toFixed(0)}%</div>
          <div class="cbox-s num">광고 ${won(r.gp.crm.s)} → 매출 ${won(r.gp.crm.r)}</div></div>
        <div class="cbox"><div class="cbox-l">오가닉 (무광고)</div><div class="cbox-v num">${won(r.gp.org)}</div>
          <div class="cbox-s">전체매출의 ${(r.gp.org/r.gp.tot*100).toFixed(0)}%</div></div>
        <div class="cbox"><div class="cbox-l">온드미디어 (무광고)</div><div class="cbox-v num">${won(r.gp.owned)}</div>
          <div class="cbox-s">전체매출의 ${(r.gp.owned/r.gp.tot*100).toFixed(1)}%</div></div>
      </div>
    </div>

    <div class="lv"><div class="lvt"><span class="n">4</span>퍼포먼스 채널별 매체 vs Cafe24 실측 — 어디서 났나</div>
      <div class="tw"><table class="mini"><thead><tr><th class="l">채널</th><th>광고비</th><th>매체매출</th><th>Cafe24실측</th><th>매체ROAS</th><th>실측ROAS</th><th>귀속률</th><th>평소대비</th></tr></thead>
      <tbody>${chRows}</tbody></table></div>
      ${gapBlock}
    </div>

    <div class="lv"><div class="lvt"><span class="n">5</span>원가율은 왜 이렇게 나왔나</div>
      <div class="blocked">원가 <b class="num">${won(r.cost)}</b> · 원가율 <b class="num">${pct(r.w)}</b> — 더 들어가려면 <b>일자별 품목별 판매량</b> 필요 (출고 데이터 탭 + 원가 tracking 시트 연결). <b>현재 미연결</b></div>
    </div>
  </div>`;
}

function cmpView(){
  const days=sel.map(i=>ROWS[i]);
  const rowsDef=[
    ['순매출',r=>won(r.net),r=>r.net,1,0],
    ['공헌이익',r=>won(r.cp),r=>r.cp,1,0],
    ['이익률',r=>pct(r.i),r=>r.i,1,0],
    ['원가율',r=>pct(r.w),r=>-r.w,1,0],
    ['광고비비중',r=>pct(r.g),r=>-r.g,1,0],
    ['순ROAS',r=>(r.net/r.ad*100).toFixed(0)+'%',r=>r.net/r.ad,1,0],
    ['SEC채널 그룹별 성과 (UTM)','','',0,0],
    ['퍼포먼스 광고비',r=>won(r.gp.perf.s),r=>r.gp.perf.s,0,1],
    ['퍼포먼스 매출',r=>won(r.gp.perf.r),r=>r.gp.perf.r,1,1],
    ['퍼포먼스 ROAS',r=>r.gp.perf.roas.toFixed(0)+'%',r=>r.gp.perf.roas,1,1],
    ['CRM 광고비',r=>won(r.gp.crm.s),r=>r.gp.crm.s,0,1],
    ['CRM 매출',r=>won(r.gp.crm.r),r=>r.gp.crm.r,1,1],
    ['CRM ROAS',r=>r.gp.crm.roas.toFixed(0)+'%',r=>r.gp.crm.roas,1,1],
    ['오가닉 매출',r=>won(r.gp.org),r=>r.gp.org,1,1],
    ['온드미디어 매출',r=>won(r.gp.owned),r=>r.gp.owned,1,1],
  ];
  const chs=['네이버','메타','구글SA','구글DA','페이코','에디ai','토스'];
  let head='<th class="l">지표</th>'+days.map(r=>`<th>${md(r.d)}<br><span style="font-weight:600;color:var(--muted)">${r.dow}</span></th>`).join('');
  let body=rowsDef.map(([lb,f,sortv,hi,ind])=>{
    if(typeof lb==='string'&&lb.startsWith('SEC')) return `<tr><td class="l" colspan="${days.length+2}" style="font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border:none;padding-top:10px">${lb.slice(3)}</td></tr>`;
    const vals=days.map(sortv); const mx=Math.max(...vals),mn=Math.min(...vals);
    return `<tr><td class="l" style="font-weight:${ind?600:700};color:${ind?'var(--ink2)':'var(--ink)'};${ind?'padding-left:16px':''}">${lb}</td>`+
      days.map((r,k)=>{const v=vals[k]; let c='';
        if(hi&&days.length>1&&mx!==mn){c=v===mx?'color:var(--good);font-weight:800':v===mn?'color:var(--bad);font-weight:800':'';}
        return `<td class="num" style="${c}">${f(r)}</td>`;}).join('')+'</tr>';
  }).join('');
  // 채널 귀속률 비교
  let chBody=chs.filter(cn=>BR[cn]!=null).map(cn=>{
    return `<tr><td class="l" style="font-weight:700;color:var(--ink)">${cn} 귀속률</td>`+
      days.map(r=>{const c=r.ch.find(x=>x.n===cn); if(!c||c.ret===null||c.derived)return '<td class="num" style="color:var(--muted)">—</td>';
        const dev=BR[cn]?c.ret-BR[cn]:0; const col=dev<-8?'var(--bad)':dev>8?'var(--good)':'var(--ink2)';
        return `<td class="num" style="color:${col};font-weight:${Math.abs(dev)>8?800:400}">${c.ret}%</td>`;}).join('')+
      `<td class="num" style="color:var(--muted);font-size:11px">기준 ${BR[cn]}%</td></tr>`;
  }).join('');
  return `<div class="card">
    <div class="ct">일자 비교 <span class="badge">${days.map(r=>md(r.d)).join(' · ')}</span></div>
    <div class="cd"><b class="up">초록</b>=선택일 중 최고, <b class="dn">빨강</b>=최저. 원가율·광고비비중은 낮을수록 좋으므로 반전 반영. 채널 귀속률은 평소 기준 대비 ±8%p 이탈 시 색 표시.</div>
    <div class="tw"><table><thead><tr>${head}<th></th></tr></thead>
    <tbody>${body}<tr><td colspan="${days.length+2}" style="height:8px;border:none"></td></tr>
    <tr><td class="l" colspan="${days.length+2}" style="font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border:none;padding-top:4px">매체 vs 실측 귀속률 (라스트터치 신뢰도)</td></tr>
    ${chBody}</tbody></table></div>
    <div class="foot">좌측에서 날짜를 더하거나 빼서 비교 대상을 바꿀 수 있습니다. 1개만 선택하면 상세 분해로 전환됩니다.</div>
