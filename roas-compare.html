<title>한끼통살 · 매체-Cafe24 ROAS 비교</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f2f7;color:#1e2333;font-size:15px;line-height:1.6}

.topbar{background:#1e2333;padding:0 28px;height:58px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:18px;font-weight:800;color:#fff}
.topbar-sub{font-size:13px;color:rgba(255,255,255,.5)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.status-dot.ok{background:#4caf50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:12px;color:rgba(255,255,255,.5)}
.wrap{max-width:1560px;margin:0 auto;padding:22px 20px}

/* Filter */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.flabel{font-size:12px;font-weight:700;color:#8a91a8;letter-spacing:.5px;text-transform:uppercase}
.fbtn{padding:7px 16px;border:1.5px solid #d8dce8;border-radius:18px;background:#fff;color:#4a5478;font-size:13px;cursor:pointer;transition:.12s;font-family:inherit;font-weight:500}
.fbtn:hover{border-color:#4466cc;color:#4466cc}
.fbtn.active{background:#4466cc;border-color:#4466cc;color:#fff;font-weight:700}
.fsep{width:1px;height:20px;background:#dde0ea;margin:0 4px}
.data-badge{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32;font-size:12px;font-weight:700;padding:4px 12px;border-radius:12px;margin-left:auto}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi-card{background:#fff;border-radius:12px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.kpi-card.hl{background:#1e2333}
.kpi-card.hl2{background:#4466cc}
.kpi-label{font-size:11px;font-weight:700;color:#8a91a8;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.kpi-card.hl .kpi-label,.kpi-card.hl2 .kpi-label{color:rgba(255,255,255,.6)}
.kpi-value{font-size:22px;font-weight:800;color:#1e2333;letter-spacing:-.5px;line-height:1.2}
.kpi-card.hl .kpi-value,.kpi-card.hl2 .kpi-value{color:#fff}
.kpi-sub{font-size:12px;color:#8a91a8;margin-top:5px}
.kpi-card.hl .kpi-sub,.kpi-card.hl2 .kpi-sub{color:rgba(255,255,255,.5)}

/* Section */
.section{background:#fff;border-radius:12px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:18px}
.sec-title{font-size:15px;font-weight:700;color:#1e2333;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sec-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;background:#eef2ff;color:#4466cc}
.sec-note{font-size:12px;color:#bbb;font-style:italic}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 13px;text-align:right;font-size:11px;font-weight:700;color:#8a91a8;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #f0f2f7;white-space:nowrap;background:#fafbfe}
thead th:first-child{text-align:left;position:sticky;left:0;z-index:2;background:#fafbfe}
thead th.group-a{background:#eef2ff;color:#4466cc}
thead th.group-b{background:#e8f5e9;color:#2e7d32}
thead th.group-c{background:#fff8e1;color:#f57f17}
thead th.group-diff{background:#fce4ec;color:#c62828}
tbody tr{border-bottom:1px solid #f0f3f9;transition:background .1s}
tbody tr:hover td{background:#f5f7ff}
tbody tr.parent-row>td{background:#fff}
tbody tr.sub-row{display:none}
tbody tr.sub-row.open{display:table-row}
tbody tr.sub-row td{color:#555;font-size:13px;background:#f8f9fe}
tbody td{padding:11px 13px;text-align:right;white-space:nowrap;font-size:14px}
tbody td:first-child{text-align:left;font-weight:600;position:sticky;left:0;z-index:1;background:inherit}
tbody tr.sub-row td:first-child{font-weight:400;padding-left:28px;background:#f8f9fe}
tbody tr.total-row td{background:#f0f2f7!important;font-weight:700;font-size:14px;border-top:2.5px solid #4466cc}
tbody tr.organic-row td{color:#2e7d32}
.dash{color:#ccc;font-size:12px}
.pos{color:#2e7d32;font-weight:700}
.neg{color:#c62828;font-weight:700}
.rc{display:inline-block;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:700}
.rc-hi{background:#e8f5e9;color:#2e7d32}
.rc-md{background:#fff8e1;color:#f57f17}
.rc-lo{background:#fce4ec;color:#c62828}
.ci{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.ci-naver{background:#03c75a}.ci-meta{background:#1877f2}.ci-google{background:#ea4335}
.ci-payco{background:#ff5722}.ci-toss{background:#0064ff}.ci-aedi{background:#9c27b0}
.expand-btn{background:none;border:none;cursor:pointer;color:#4466cc;font-size:11px;font-weight:700;padding:0 3px;font-family:inherit;vertical-align:middle}

/* 월별 성과 비교 */
.compare-controls{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.compare-side{display:flex;align-items:center;gap:8px}
.side-chip{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.side-chip.a{background:#4466cc}
.side-chip.b{background:#2e7d32}
.compare-controls select{padding:6px 12px;border:1.5px solid #d8dce8;border-radius:10px;background:#fff;font-size:13px;font-family:inherit;color:#1e2333;cursor:pointer;outline:none}
.compare-controls select:focus{border-color:#4466cc}
.compare-vs{font-size:13px;font-weight:700;color:#8a91a8}
.compare-sep{width:1px;height:20px;background:#dde0ea}
.cmp-a{background:#eef2ff!important}
.cmp-b{background:#f0fdf6!important}
.cmp-diff-pos{color:#2e7d32;font-weight:700}
.cmp-diff-neg{color:#c62828;font-weight:700}
.cmp-total td{background:#f4f4f8!important;font-weight:700;border-top:2px solid #aaa}

/* Daily channel filter */
.ch-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.ch-btn{padding:6px 15px;border:1.5px solid #d8dce8;border-radius:16px;background:#fff;color:#4a5478;font-size:13px;font-weight:500;cursor:pointer;transition:.12s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.ch-btn:hover{border-color:#4466cc;color:#4466cc}
.ch-btn.active.all{background:#4466cc;border-color:#4466cc;color:#fff;font-weight:700}
.ch-btn.active.naver{color:#03c75a;border-color:#03c75a;background:#f0fdf6;font-weight:700}
.ch-btn.active.meta{color:#1877f2;border-color:#1877f2;background:#eef4ff;font-weight:700}
.ch-btn.active.google_sa,.ch-btn.active.google_da{color:#ea4335;border-color:#ea4335;background:#fff5f5;font-weight:700}
.ch-btn.active.payco{color:#ff5722;border-color:#ff5722;background:#fff5f0;font-weight:700}
.ch-btn.active.toss{color:#0064ff;border-color:#0064ff;background:#f0f5ff;font-weight:700}
.ch-btn.active.aedi{color:#9c27b0;border-color:#9c27b0;background:#fdf0ff;font-weight:700}

.loader{display:flex;align-items:center;justify-content:center;height:180px;color:#8a91a8;font-size:14px;gap:12px}

.err{background:#fce4ec;color:#c62828;padding:14px 18px;border-radius:10px;font-size:13px}

function n(v){ return parseFloat((v||'0').replace(/,/g,''))||0; }

// 억 단위(1억+)는 소수점 1자리, 나머지 만 단위 정수
function fmtV(v){
  const abs=Math.abs(v);
  if(abs>=1e8) return (v<0?'-':'')+(abs/1e8).toFixed(1)+'억';
  return (v<0?'-':'')+Math.round(abs/1e4).toLocaleString()+'만';
}
// 차이값: 항상 부호 포함
function fmtDiff(v){
  const abs=Math.abs(v);
  const s=abs>=1e8?(abs/1e8).toFixed(1)+'억':Math.round(abs/1e4).toLocaleString()+'만';
  return (v>=0?'+':'-')+s;
}
function fmtRoasDiff(v){ return (v>=0?'+':'')+Math.round(v)+'%p'; }

  return `<span class="rc ${c}">${Math.round(r)}%</span>`;
}
function parseCSV(t){
  return t.trim().split('\n').map(l=>{
    const cs=[]; let c='',q=false;
    for(let i=0;i<l.length;i++){
      const ch=l[i];
      if(q){if(ch==='"'){if(l[i+1]==='"'){c+='"';i++;}else q=false;}else c+=ch;}
      else{if(ch==='"')q=true;else if(ch===','){cs.push(c);c='';}else c+=ch;}
    }
    cs.push(c); return cs;
  });
}

  }catch(e){
    setStatus('오류: '+e.message,'#e53935',false);
    document.getElementById('kpi-grid').innerHTML=`<div class="err" style="grid-column:1/-1">로드 실패: ${e.message}</div>`;
  }
}
function setStatus(m,c,ok){
  document.getElementById('stxt').textContent=m;
  const d=document.getElementById('sdot');
  d.style.background=c; d.className='status-dot'+(ok?' ok':'');
}

// ═══ AGGREGATE ═══════════════════════════════════════════════════
function filteredDays(){ return activeMonth==='all'?rawDays:rawDays.filter(d=>d.month===activeMonth); }
function aggDays(days){
  const res={}; PAID_CH.forEach(k=>res[k]={spd:0,mrev:0,crev:0});
  res.organic={crev:0};
  days.forEach(d=>{
    PAID_CH.forEach(k=>{
      res[k].spd +=(d.media[k]||{spd:0}).spd;
      res[k].mrev+=(d.media[k]||{rev:0}).rev;
      res[k].crev+=(d.c24[k]||0);
    });
    res.organic.crev+=(d.c24.organic||0);
  });
  return res;
}
function getChMetrics(day, ch){
  if(!day) return {spd:0,mrev:0,crev:0};
  if(ch==='all') return {
    spd: PAID_CH.reduce((s,k)=>s+(day.media[k]||{spd:0}).spd,0),
    mrev:PAID_CH.reduce((s,k)=>s+(day.media[k]||{rev:0}).rev,0),
    crev:PAID_CH.reduce((s,k)=>s+(day.c24[k]||0),0),
  };
  return {spd:(day.media[ch]||{spd:0}).spd, mrev:(day.media[ch]||{rev:0}).rev, crev:(day.c24[ch]||0)};
}

// ═══ RENDER ══════════════════════════════════════════════════════
function render(){
  const days=filteredDays(), agg=aggDays(days);
  renderKPI(agg);
  renderMainTable(agg,days);
  renderCompare();
  document.getElementById('tbl-badge').textContent=activeMonth==='all'?'3~6월 합계':activeMonth;
  if(activeView==='daily'){
    document.getElementById('daily-section').style.display='';
    renderDailyTable(days);
  } else {
    document.getElementById('daily-section').style.display='none';
  }
  renderOrganicTable(days,agg);
}

// ── KPI ──────────────────────────────────────────────────────────
function renderKPI(agg){
  const spd=PAID_CH.reduce((s,k)=>s+agg[k].spd,0);
  const mRev=PAID_CH.reduce((s,k)=>s+agg[k].mrev,0);
  const cRev=PAID_CH.reduce((s,k)=>s+agg[k].crev,0);
  const mR=roas(spd,mRev), cR=roas(spd,cRev);
  // 차이: 매체 - Cafe24
  const roasDiff=mR-cR, revDiff=mRev-cRev;
  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card hl">
      <div class="kpi-label">총 매체비용</div>
      <div class="kpi-value">${fmtV(spd)}</div>
      <div class="kpi-sub">VAT 제외</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">매체 보고 매출</div>
      <div class="kpi-value">${fmtV(mRev)}</div>
      <div class="kpi-sub">${roasChip(mR)} 매체 ROAS</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Cafe24 실매출</div>
      <div class="kpi-value">${fmtV(cRev)}</div>
      <div class="kpi-sub">${roasChip(cR)} Cafe24 ROAS</div>
    </div>
    <div class="kpi-card hl2">
      <div class="kpi-label">ROAS 차이</div>
      <div class="kpi-value">${fmtRoasDiff(roasDiff)}</div>
      <div class="kpi-sub">매체 − Cafe24</div>
    </div>
    <div class="kpi-card hl2">
      <div class="kpi-label">매출 차이</div>
      <div class="kpi-value">${fmtDiff(revDiff)}</div>
      <div class="kpi-sub">매체 − Cafe24</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">오가닉 매출</div>
      <div class="kpi-value">${fmtV(agg.organic.crev)}</div>
      <div class="kpi-sub">채널없음 Cafe24</div>
    </div>
  `;
}

// ── Main Table ────────────────────────────────────────────────────
function renderMainTable(agg,days){
  const subAgg={};
  NAVER_SUBS.forEach(({key})=>{
    subAgg[key]={spd:0,mrev:0};
    days.forEach(d=>{subAgg[key].spd+=(d.media[key]||{spd:0}).spd; subAgg[key].mrev+=(d.media[key]||{rev:0}).rev;});
  });

  let rows='';
  PAID_CH.forEach(k=>{
    const{spd,mrev,crev}=agg[k], m=CH_META[k];
    const mR=roas(spd,mrev), cR=roas(spd,crev);
    const isNaver=k==='naver';
    // ▶ 버튼을 채널명 뒤에 배치
    const expBtn=isNaver?` <button class="expand-btn" id="nv-tog" onclick="toggleNaver()">▶</button>`:'';
    rows+=`<tr class="parent-row">
      <td><span class="ci ${m.ci}"></span>${m.label}${expBtn}</td>
      <td>${fmtV(spd)}</td>
      <td class="dv">${fmtV(mrev)}</td><td>${roasChip(mR)}</td>
      <td class="dv">${fmtV(crev)}</td><td>${roasChip(cR)}</td>
      <td class="dv ${mR-cR>=0?'pos':'neg'}">${fmtRoasDiff(mR-cR)}</td>
      <td class="${mrev-crev>=0?'pos':'neg'}">${fmtDiff(mrev-crev)}</td>
    </tr>`;
    if(isNaver){
      NAVER_SUBS.forEach(({key,label})=>{
        const{spd:ss,mrev:sr}=subAgg[key];
        rows+=`<tr class="sub-row nv-sub${naverExpanded?' open':''}">
          <td>&nbsp;&nbsp;└ ${label}</td>
          <td>${fmtV(ss)}</td>
          <td class="dv">${fmtV(sr)}</td><td>${roasChip(roas(ss,sr))}</td>
          <td class="dv dash">—</td><td class="dash">—</td>
          <td class="dv dash">—</td><td class="dash">—</td>
        </tr>`;
      });
    }
  });
  const tS=PAID_CH.reduce((s,k)=>s+agg[k].spd,0);
  const tM=PAID_CH.reduce((s,k)=>s+agg[k].mrev,0);
  const tC=PAID_CH.reduce((s,k)=>s+agg[k].crev,0);
  const tMR=roas(tS,tM), tCR=roas(tS,tC);
  rows+=`<tr class="total-row">
    <td>합계</td><td>${fmtV(tS)}</td>
    <td class="dv">${fmtV(tM)}</td><td>${roasChip(tMR)}</td>
    <td class="dv">${fmtV(tC)}</td><td>${roasChip(tCR)}</td>
    <td class="dv ${tMR-tCR>=0?'pos':'neg'}">${fmtRoasDiff(tMR-tCR)}</td>
    <td class="${tM-tC>=0?'pos':'neg'}">${fmtDiff(tM-tC)}</td>
  </tr>`;
  document.getElementById('main-table').innerHTML=`<table>
    <thead>
      <tr>
        <th rowspan="2" style="text-align:left;vertical-align:bottom">매체</th>
        <th rowspan="2">매체비용</th>
        <th colspan="2" class="group-a dv">매체 보고</th>
        <th colspan="2" class="group-b dv">Cafe24 실측</th>
        <th colspan="2" class="group-c dv">차이 (매체 − C24)</th>
      </tr>
      <tr>
        <th class="group-a dv">매출</th><th class="group-a">ROAS</th>
        <th class="group-b dv">매출</th><th class="group-b">ROAS</th>
        <th class="group-c dv">ROAS차이</th><th class="group-c">매출차이</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}
function toggleNaver(){
  naverExpanded=!naverExpanded;
  document.querySelectorAll('.nv-sub').forEach(r=>r.classList.toggle('open',naverExpanded));
  const btn=document.getElementById('nv-tog');
  if(btn)btn.textContent=naverExpanded?'▼':'▶';
}

// ── 월별 성과 비교 ────────────────────────────────────────────────
function renderCompare(){
  const mA=document.getElementById('sel-a').value;
  const mB=document.getElementById('sel-b').value;
  const ch=document.getElementById('sel-cmp-ch').value;
  const mLabelA=mA.slice(5)+'월', mLabelB=mB.slice(5)+'월';

  // day-of-month별 그룹화
  const byDomA={}, byDomB={};
  rawDays.forEach(d=>{
    const dom=parseInt(d.date.slice(8));
    if(d.month===mA) byDomA[dom]=d;
    if(d.month===mB) byDomB[dom]=d;
  });
  const doms=[...new Set([...Object.keys(byDomA),...Object.keys(byDomB)].map(Number))].sort((a,b)=>a-b);

  // 합계
  let totA={spd:0,mrev:0,crev:0}, totB={spd:0,mrev:0,crev:0};

  let rows='';
  doms.forEach(dom=>{
    const dA=byDomA[dom], dB=byDomB[dom];
    const mA_=getChMetrics(dA,ch), mB_=getChMetrics(dB,ch);
    totA.spd+=mA_.spd; totA.mrev+=mA_.mrev; totA.crev+=mA_.crev;
    totB.spd+=mB_.spd; totB.mrev+=mB_.mrev; totB.crev+=mB_.crev;
    const rMA=roas(mA_.spd,mA_.mrev), rCA=roas(mA_.spd,mA_.crev);
    const rMB=roas(mB_.spd,mB_.mrev), rCB=roas(mB_.spd,mB_.crev);
    const diffMRev=mB_.mrev-mA_.mrev, diffCRev=mB_.crev-mA_.crev;

    const cellA=dA?`<td class="cmp-a">${fmtV(mA_.spd)}</td><td class="cmp-a">${fmtV(mA_.mrev)}</td><td class="cmp-a">${roasChip(rMA)}</td><td class="cmp-a">${fmtV(mA_.crev)}</td><td class="cmp-a">${roasChip(rCA)}</td>`
      :`<td class="cmp-a dash">—</td><td class="cmp-a dash">—</td><td class="cmp-a dash">—</td><td class="cmp-a dash">—</td><td class="cmp-a dash">—</td>`;
    const cellB=dB?`<td class="cmp-b dv">${fmtV(mB_.spd)}</td><td class="cmp-b">${fmtV(mB_.mrev)}</td><td class="cmp-b">${roasChip(rMB)}</td><td class="cmp-b">${fmtV(mB_.crev)}</td><td class="cmp-b">${roasChip(rCB)}</td>`
      :`<td class="cmp-b dv dash">—</td><td class="cmp-b dash">—</td><td class="cmp-b dash">—</td><td class="cmp-b dash">—</td><td class="cmp-b dash">—</td>`;
    const diffCell=(dA&&dB)?`<td class="dv ${diffMRev>=0?'cmp-diff-pos':'cmp-diff-neg'}">${fmtDiff(diffMRev)}</td><td class="${diffCRev>=0?'cmp-diff-pos':'cmp-diff-neg'}">${fmtDiff(diffCRev)}</td>`
      :`<td class="dv dash">—</td><td class="dash">—</td>`;

    rows+=`<tr><td>${dom}일</td>${cellA}${cellB}${diffCell}</tr>`;
  });

  // 합계 행
  const rMA=roas(totA.spd,totA.mrev), rCA=roas(totA.spd,totA.crev);
  const rMB=roas(totB.spd,totB.mrev), rCB=roas(totB.spd,totB.crev);
  const dMR=totB.mrev-totA.mrev, dCR=totB.crev-totA.crev;
  rows+=`<tr class="cmp-total">
    <td>합계</td>
    <td class="cmp-a">${fmtV(totA.spd)}</td><td class="cmp-a">${fmtV(totA.mrev)}</td><td class="cmp-a">${roasChip(rMA)}</td><td class="cmp-a">${fmtV(totA.crev)}</td><td class="cmp-a">${roasChip(rCA)}</td>
    <td class="cmp-b dv">${fmtV(totB.spd)}</td><td class="cmp-b">${fmtV(totB.mrev)}</td><td class="cmp-b">${roasChip(rMB)}</td><td class="cmp-b">${fmtV(totB.crev)}</td><td class="cmp-b">${roasChip(rCB)}</td>
    <td class="dv ${dMR>=0?'cmp-diff-pos':'cmp-diff-neg'}">${fmtDiff(dMR)}</td>
    <td class="${dCR>=0?'cmp-diff-pos':'cmp-diff-neg'}">${fmtDiff(dCR)}</td>
  </tr>`;

  const chLabel=ch==='all'?'전체':(CH_META[ch]?.label||ch);
  document.getElementById('compare-table').innerHTML=`
    <div style="font-size:12px;color:#8a91a8;margin-bottom:8px">
      매체: <strong>${chLabel}</strong> &nbsp;|&nbsp; 차이 = B월 − A월
    </div>
    <table>
      <thead>
        <tr>
          <th rowspan="2" style="text-align:left;vertical-align:bottom">일</th>
          <th colspan="5" class="group-a dv">A) ${mLabelA}</th>
          <th colspan="5" class="group-b dv">B) ${mLabelB}</th>
          <th colspan="2" class="group-diff dv">차이 (B − A)</th>
        </tr>
        <tr>
          <th class="group-a dv">매체비용</th><th class="group-a">매체매출</th><th class="group-a">ROAS</th><th class="group-a">C24매출</th><th class="group-a">C24ROAS</th>
          <th class="group-b dv">매체비용</th><th class="group-b">매체매출</th><th class="group-b">ROAS</th><th class="group-b">C24매출</th><th class="group-b">C24ROAS</th>
          <th class="group-diff dv">매체매출</th><th class="group-diff">C24매출</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Daily Table ──────────────────────────────────────────────────
function renderDailyTable(days){
  const ch=activeCh;
  document.getElementById('daily-badge').textContent=ch==='all'?'전체 합계':(CH_META[ch]?.label||ch);
  let rows='';
  days.forEach(d=>{
    const{spd,mrev,crev}=getChMetrics(d,ch);
    const mR=roas(spd,mrev), cR=roas(spd,crev);
    rows+=`<tr>
      <td>${d.date}</td><td>${fmtV(spd)}</td>
      <td class="dv">${fmtV(mrev)}</td><td>${roasChip(mR)}</td>
      <td class="dv">${fmtV(crev)}</td><td>${roasChip(cR)}</td>
      <td class="dv ${mR-cR>=0?'pos':'neg'}">${fmtRoasDiff(mR-cR)}</td>
      <td class="${mrev-crev>=0?'pos':'neg'}">${fmtDiff(mrev-crev)}</td>
    </tr>`;
  });
  document.getElementById('daily-table').innerHTML=`<table>
    <thead><tr>
      <th style="text-align:left">날짜</th><th>매체비용</th>
      <th class="group-a dv">매체매출</th><th class="group-a">매체ROAS</th>
      <th class="group-b dv">C24매출</th><th class="group-b">C24 ROAS</th>
      <th class="group-c dv">ROAS차이</th><th class="group-c">매출차이</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Organic ──────────────────────────────────────────────────────
function renderOrganicTable(days,agg){
  const byM={};
  days.forEach(d=>{if(!byM[d.month])byM[d.month]={crev:0,cnt:0};byM[d.month].crev+=(d.c24.organic||0);byM[d.month].cnt++;});
  let rows='';
  Object.keys(byM).sort().forEach(m=>{
    rows+=`<tr class="organic-row"><td>${m}</td><td>${byM[m].cnt}일</td><td>${fmtV(byM[m].crev)}</td></tr>`;
  });
  rows+=`<tr class="total-row"><td>합계</td><td>—</td><td>${fmtV(agg.organic.crev)}</td></tr>`;
  document.getElementById('organic-table').innerHTML=`<table>
    <thead><tr><th style="text-align:left">월</th><th>일수</th><th>오가닉 매출 (Cafe24)</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ═══ EVENTS ══════════════════════════════════════════════════════
document.querySelectorAll('[data-m]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-m]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeMonth=btn.dataset.m; naverExpanded=false;
    if(rawDays.length)render();
  });
});
document.querySelectorAll('[data-view]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-view]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeView=btn.dataset.view;
    if(rawDays.length)render();
  });
});
document.querySelectorAll('#ch-filter .ch-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#ch-filter .ch-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeCh=btn.dataset.ch;
    if(rawDays.length)renderDailyTable(filteredDays());
  });
});
['sel-a','sel-b','sel-cmp-ch'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{if(rawDays.length)renderCompare();});
});

// ═══ INIT ════════════════════════════════════════════════════════
document.querySelector('[data-m="all"]').classList.add('active');
document.querySelector('[data-view="monthly"]').classList.add('active');
loadMedia();
</script>
