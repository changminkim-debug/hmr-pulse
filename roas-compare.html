<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>한끼통살 · 매체-Cafe24 ROAS 비교</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f2f7;color:#1e2333;font-size:14px;line-height:1.5}
.topbar{background:#1e2333;padding:0 24px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:16px;font-weight:800;color:#fff}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.5)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.status-dot.ok{background:#4caf50;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:11px;color:rgba(255,255,255,.5)}
.wrap{max-width:1500px;margin:0 auto;padding:20px 18px}

/* ── Filter ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.flabel{font-size:11px;font-weight:700;color:#8a91a8;letter-spacing:.5px;text-transform:uppercase}
.fbtn{padding:5px 13px;border:1.5px solid #d8dce8;border-radius:16px;background:#fff;color:#4a5478;font-size:12px;cursor:pointer;transition:.12s;font-family:inherit}
.fbtn:hover{border-color:#4466cc;color:#4466cc}
.fbtn.active{background:#4466cc;border-color:#4466cc;color:#fff;font-weight:600}
.fsep{width:1px;height:18px;background:#dde0ea;margin:0 2px}
.data-badge{background:#e8f5e9;border:1px solid #4caf50;color:#2e7d32;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;margin-left:auto}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi-card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi-card.hl{background:#1e2333}
.kpi-card.hl2{background:#4466cc}
.kpi-label{font-size:10px;font-weight:700;color:#8a91a8;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.kpi-card.hl .kpi-label,.kpi-card.hl2 .kpi-label{color:rgba(255,255,255,.6)}
.kpi-value{font-size:22px;font-weight:800;color:#1e2333;letter-spacing:-.5px;line-height:1.2}
.kpi-card.hl .kpi-value,.kpi-card.hl2 .kpi-value{color:#fff}
.kpi-sub{font-size:11px;color:#8a91a8;margin-top:3px}
.kpi-card.hl .kpi-sub,.kpi-card.hl2 .kpi-sub{color:rgba(255,255,255,.5)}
.kpi-delta{display:inline-block;font-size:12px;font-weight:700;padding:1px 6px;border-radius:6px;margin-top:4px}
.kpi-delta.pos{background:#e8f5e9;color:#2e7d32}
.kpi-delta.neg{background:#fce4ec;color:#c62828}

/* ── Section ── */
.section{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.sec-title{font-size:14px;font-weight:700;color:#1e2333;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:#eef2ff;color:#4466cc}
.sec-note{font-size:11px;color:#aaa;font-style:italic}

/* ── Table ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:9px 12px;text-align:right;font-size:10px;font-weight:700;color:#8a91a8;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #f0f2f7;white-space:nowrap;background:#fafbfe}
thead th:first-child{text-align:left;position:sticky;left:0;z-index:2;background:#fafbfe}
thead th.group-a{background:#eef2ff;color:#4466cc}
thead th.group-b{background:#e8f5e9;color:#2e7d32}
thead th.group-c{background:#fff8e1;color:#f57f17}
tbody tr{border-bottom:1px solid #f4f6fb;transition:background .1s}
tbody tr:hover{background:#f8f9ff}
tbody tr.parent-row{background:#fafbfe}
tbody tr.sub-row td{color:#5a6080;font-size:11.5px}
tbody td{padding:10px 12px;text-align:right;white-space:nowrap}
tbody td:first-child{text-align:left;font-weight:600;position:sticky;left:0;background:inherit;z-index:1}
tbody tr.sub-row td:first-child{font-weight:400;padding-left:28px}
tbody tr.total-row{border-top:2px solid #4466cc;font-weight:700;background:#f0f2f7}
tbody tr.organic-row{background:#f0f9f4;color:#2e7d32}
td.tbd{color:#ccc;font-size:11px}
td.pos{color:#2e7d32;font-weight:600}
td.neg{color:#c62828;font-weight:600}
.roas-chip{display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.roas-hi{background:#e8f5e9;color:#2e7d32}
.roas-md{background:#fff8e1;color:#f57f17}
.roas-lo{background:#fce4ec;color:#c62828}
.ci{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.ci-naver{background:#03c75a}
.ci-meta{background:#1877f2}
.ci-google{background:#ea4335}
.ci-payco{background:#ff5722}
.ci-toss{background:#0064ff}
.ci-aedi{background:#9c27b0}
.ci-organic{background:#8bc34a}
.expand-btn{background:none;border:none;cursor:pointer;color:#8a91a8;font-size:10px;padding:0 3px;font-family:inherit;vertical-align:middle}

/* ── Charts ── */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:1000px){.charts-grid{grid-template-columns:1fr}}
.chart-box{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-title{font-size:13px;font-weight:700;color:#1e2333;margin-bottom:12px}
.chart-wrap{position:relative;height:220px}

/* ── Loader / Error ── */
.loader{display:flex;align-items:center;justify-content:center;height:160px;color:#8a91a8;font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2px solid #dde0ea;border-top-color:#4466cc;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#fce4ec;color:#c62828;padding:12px 16px;border-radius:8px;font-size:12px}

/* ── Columns dividers ── */
th.divider,td.divider{border-left:1px solid #e8ecf4}
</style>
</head>

function n(v){ return parseFloat((v||'0').replace(/,/g,''))||0; }
function roas(spd,rev){ return spd>0?(rev/spd*100):0; }
function pct(v){ return v.toFixed(1)+'%'; }
function fmtM(v){ // 억/M 단위
  if(v>=1e8) return (v/1e8).toFixed(2)+'억';
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  return Math.round(v).toLocaleString();
}
function fmtPct(v){ return (v>=0?'+':'')+v.toFixed(1)+'%p'; }
function roasChip(r){
  const cls=r>=400?'roas-hi':r>=200?'roas-md':'roas-lo';
  return `<span class="roas-chip ${cls}">${Math.round(r)}%</span>`;
}

function parseCSV(text){
  return text.trim().split('\n').map(line=>{
    const cells=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(inQ){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}else cur+=c;}
      else{if(c==='"')inQ=true;else if(c===','){cells.push(cur);cur='';}else cur+=c;}
    }
    cells.push(cur);return cells;
  });
}

async function fetchGviz(cols){
  const tq=`SELECT ${cols.join(',')} WHERE C >= date '${START}' AND C <= date '${END}'`;
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}&tq=${encodeURIComponent(tq)}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.text();
}

  }catch(e){
    setStatus('오류: '+e.message,'#e53935',false);
    document.getElementById('kpi-grid').innerHTML=`<div class="err">매체 데이터 로드 실패: ${e.message}<br>스프레드시트 공유 설정을 확인해주세요.</div>`;
  }
}

function setStatus(msg,color,ok){
  document.getElementById('stxt').textContent=msg;
  const d=document.getElementById('sdot');
  d.style.background=color;
  d.className='status-dot'+(ok?' ok':'');
}

// ═══════════════════════════════════════════════════════════════
// 5. AGGREGATE
// ═══════════════════════════════════════════════════════════════
function filteredDays(){
  return activeMonth==='all'?rawDays:rawDays.filter(d=>d.month===activeMonth);
}

function aggDays(days){
  const res={};
  PAID_CH.forEach(k=>res[k]={spd:0,mrev:0,crev:0});
  res.organic={crev:0};
  days.forEach(d=>{
    PAID_CH.forEach(k=>{
      res[k].spd  +=(d.media[k]||{spd:0}).spd;
      res[k].mrev +=(d.media[k]||{rev:0}).rev;
      res[k].crev +=(d.c24[k]||0);
    });
    res.organic.crev+=(d.c24.organic||0);
  });
  return res;
}

// ═══════════════════════════════════════════════════════════════
// 6. RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  const days=filteredDays();
  const agg=aggDays(days);
  renderKPI(agg);
  renderMainTable(agg);
  renderGoogleTable(agg);
  renderCharts(days);
  if(activeView==='daily'){
    document.getElementById('daily-section').style.display='';
    renderDailyTable(days);
  } else {
    document.getElementById('daily-section').style.display='none';
  }
  renderOrganicTable(days);
  const badge=activeMonth==='all'?'3~6월 합계':activeMonth;
  document.getElementById('tbl-badge').textContent=badge;
}

// ── KPI ──────────────────────────────────────────────────────
function renderKPI(agg){
  const totalSpd=PAID_CH.reduce((s,k)=>s+agg[k].spd,0);
  const totalMRev=PAID_CH.reduce((s,k)=>s+agg[k].mrev,0);
  const totalCRev=PAID_CH.reduce((s,k)=>s+agg[k].crev,0);
  const mROAS=roas(totalSpd,totalMRev);
  const cROAS=roas(totalSpd,totalCRev);
  const roasDiff=cROAS-mROAS;
  const organic=agg.organic.crev;

  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card hl">
      <div class="kpi-label">총 매체비용</div>
      <div class="kpi-value">${fmtM(totalSpd)}</div>
      <div class="kpi-sub">VAT 제외</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">매체 보고 매출</div>
      <div class="kpi-value">${fmtM(totalMRev)}</div>
      <div class="kpi-sub">${roasChip(mROAS)} (매체)</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Cafe24 실매출</div>
      <div class="kpi-value">${fmtM(totalCRev)}</div>
      <div class="kpi-sub">${roasChip(cROAS)} (Cafe24)</div>
    </div>
    <div class="kpi-card hl2">
      <div class="kpi-label">ROAS 차이</div>
      <div class="kpi-value">${roasDiff>=0?'+':''}${Math.round(roasDiff)}%p</div>
      <div class="kpi-sub">Cafe24 − 매체</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">매출 차이</div>
      <div class="kpi-value">${totalCRev-totalMRev>=0?'+':''}${fmtM(totalCRev-totalMRev)}</div>
      <div class="kpi-sub">Cafe24 − 매체</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">오가닉 매출</div>
      <div class="kpi-value">${fmtM(organic)}</div>
      <div class="kpi-sub">채널없음 Cafe24</div>
    </div>
  `;
}

// ── Main Table ───────────────────────────────────────────────
function renderMainTable(agg){
  const totalMRev=PAID_CH.reduce((s,k)=>s+agg[k].mrev,0);
  const totalCRev=PAID_CH.reduce((s,k)=>s+agg[k].crev,0);
  const totalSpd=PAID_CH.reduce((s,k)=>s+agg[k].spd,0);

  let rows='';
  PAID_CH.forEach(k=>{
    const {spd,mrev,crev}=agg[k];
    const mR=roas(spd,mrev), cR=roas(spd,crev);
    const mShare=totalMRev>0?mrev/totalMRev*100:0;
    const cShare=totalCRev>0?crev/totalCRev*100:0;
    const shareDiff=cShare-mShare;
    const roasDiff=cR-mR;
    const revDiff=crev-mrev;
    const m=CH_META[k];
    rows+=`<tr class="parent-row">
      <td><span class="ci ${m.ci}"></span>${m.label}</td>
      <td>${fmtM(spd)}</td>
      <td class="divider">${fmtM(mrev)}</td>
      <td>${roasChip(mR)}</td>
      <td>${pct(mShare)}</td>
      <td class="divider">${fmtM(crev)}</td>
      <td>${roasChip(cR)}</td>
      <td>${pct(cShare)}</td>
      <td class="divider ${shareDiff>=0?'pos':'neg'}">${fmtPct(shareDiff)}</td>
      <td class="${roasDiff>=0?'pos':'neg'}">${roasDiff>=0?'+':''}${Math.round(roasDiff)}%p</td>
      <td class="${revDiff>=0?'pos':'neg'}">${fmtM(revDiff)}</td>
    </tr>`;
  });

  const totalMR=roas(totalSpd,totalMRev), totalCR=roas(totalSpd,totalCRev);
  rows+=`<tr class="total-row">
    <td>전체 합계</td>
    <td>${fmtM(totalSpd)}</td>
    <td class="divider">${fmtM(totalMRev)}</td>
    <td>${roasChip(totalMR)}</td>
    <td>100%</td>
    <td class="divider">${fmtM(totalCRev)}</td>
    <td>${roasChip(totalCR)}</td>
    <td>100%</td>
    <td class="divider ${totalCR-totalMR>=0?'pos':'neg'}">${fmtPct(0)}</td>
    <td class="${totalCR-totalMR>=0?'pos':'neg'}">${totalCR-totalMR>=0?'+':''}${Math.round(totalCR-totalMR)}%p</td>
    <td class="${totalCRev-totalMRev>=0?'pos':'neg'}">${fmtM(totalCRev-totalMRev)}</td>
  </tr>`;

  document.getElementById('main-table').innerHTML=`<table>
    <thead>
      <tr>
        <th rowspan="2" style="text-align:left;vertical-align:bottom">매체</th>
        <th rowspan="2">매체비용</th>
        <th colspan="3" class="group-a divider">매체 보고</th>
        <th colspan="3" class="group-b divider">Cafe24 실측</th>
        <th colspan="3" class="group-c divider">차이 (C24−매체)</th>
      </tr>
      <tr>
        <th class="group-a divider">매출</th>
        <th class="group-a">ROAS</th>
        <th class="group-a">비중</th>
        <th class="group-b divider">매출</th>
        <th class="group-b">ROAS</th>
        <th class="group-b">비중</th>
        <th class="group-c divider">비중차이</th>
        <th class="group-c">ROAS차이</th>
        <th class="group-c">매출차이</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Google SA/DA Table ───────────────────────────────────────
function renderGoogleTable(agg){
  const gKeys=['google_sa','google_da'];
  const totalSpd=gKeys.reduce((s,k)=>s+agg[k].spd,0);
  const totalMRev=gKeys.reduce((s,k)=>s+agg[k].mrev,0);
  const totalCRev=gKeys.reduce((s,k)=>s+agg[k].crev,0);
  const labels={google_sa:'SA (검색)', google_da:'DA (디멘드젠+VRC+디스플레이)'};

  let rows='';
  gKeys.forEach(k=>{
    const {spd,mrev,crev}=agg[k];
    const mR=roas(spd,mrev), cR=roas(spd,crev);
    const mShare=totalMRev>0?mrev/totalMRev*100:0;
    const cShare=totalCRev>0?crev/totalCRev*100:0;
    const shareDiff=cShare-mShare;
    rows+=`<tr>
      <td>${labels[k]}</td>
      <td>${fmtM(spd)}</td>
      <td class="divider">${fmtM(mrev)}</td><td>${roasChip(mR)}</td><td>${pct(mShare)}</td>
      <td class="divider">${fmtM(crev)}</td><td>${roasChip(cR)}</td><td>${pct(cShare)}</td>
      <td class="divider ${shareDiff>=0?'pos':'neg'}">${fmtPct(shareDiff)}</td>
      <td class="${cR-mR>=0?'pos':'neg'}">${cR-mR>=0?'+':''}${Math.round(cR-mR)}%p</td>
      <td class="${crev-mrev>=0?'pos':'neg'}">${fmtM(crev-mrev)}</td>
    </tr>`;
  });

  document.getElementById('google-table').innerHTML=`<table>
    <thead>
      <tr>
        <th style="text-align:left">채널</th>
        <th>매체비용</th>
        <th class="group-a divider">매체매출</th><th class="group-a">ROAS</th><th class="group-a">비중</th>
        <th class="group-b divider">C24매출</th><th class="group-b">ROAS</th><th class="group-b">비중</th>
        <th class="group-c divider">비중차이</th><th class="group-c">ROAS차이</th><th class="group-c">매출차이</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Daily Table ──────────────────────────────────────────────
function renderDailyTable(days){
  document.getElementById('daily-badge').textContent=activeMonth==='all'?'3~6월':activeMonth;
  let rows='';
  days.forEach(d=>{
    const mspd=PAID_CH.reduce((s,k)=>s+(d.media[k]||{spd:0}).spd,0);
    const mrev=PAID_CH.reduce((s,k)=>s+(d.media[k]||{rev:0}).rev,0);
    const crev=PAID_CH.reduce((s,k)=>s+(d.c24[k]||0),0);
    const mR=roas(mspd,mrev), cR=roas(mspd,crev);
    rows+=`<tr>
      <td>${d.date}</td>
      <td>${fmtM(mspd)}</td>
      <td class="divider">${fmtM(mrev)}</td><td>${roasChip(mR)}</td>
      <td class="divider">${fmtM(crev)}</td><td>${roasChip(cR)}</td>
      <td class="divider ${cR-mR>=0?'pos':'neg'}">${cR-mR>=0?'+':''}${Math.round(cR-mR)}%p</td>
      <td class="${crev-mrev>=0?'pos':'neg'}">${fmtM(crev-mrev)}</td>
    </tr>`;
  });

  document.getElementById('daily-table').innerHTML=`<table>
    <thead><tr>
      <th style="text-align:left">날짜</th>
      <th>매체비용</th>
      <th class="group-a divider">매체매출</th><th class="group-a">매체ROAS</th>
      <th class="group-b divider">C24매출</th><th class="group-b">C24ROAS</th>
      <th class="group-c divider">ROAS차이</th><th class="group-c">매출차이</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Organic Table ────────────────────────────────────────────
function renderOrganicTable(days){
  const byMonth={};
  days.forEach(d=>{
    if(!byMonth[d.month])byMonth[d.month]={crev:0,cnt:0};
    byMonth[d.month].crev+=(d.c24.organic||0);
    byMonth[d.month].cnt++;
  });
  const months=Object.keys(byMonth).sort();
  const total=months.reduce((s,m)=>s+byMonth[m].crev,0);
  let rows='';
  months.forEach(m=>{
    rows+=`<tr class="organic-row">
      <td>${m}</td>
      <td>${byMonth[m].cnt}일</td>
      <td>${fmtM(byMonth[m].crev)}</td>
      <td>${pct(total>0?byMonth[m].crev/total*100:0)}</td>
    </tr>`;
  });
  rows+=`<tr class="total-row">
    <td>합계</td><td>-</td><td>${fmtM(total)}</td><td>100%</td>
  </tr>`;
  document.getElementById('organic-table').innerHTML=`<table>
    <thead><tr>
      <th style="text-align:left">월</th>
      <th>일수</th>
      <th>오가닉 매출 (C24)</th>
      <th>비중</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Charts ───────────────────────────────────────────────────
function renderCharts(days){
  const byMonth={};
  days.forEach(d=>{
    if(!byMonth[d.month])byMonth[d.month]=[];
    byMonth[d.month].push(d);
  });
  const months=Object.keys(byMonth).sort();

  const spendDatasets=PAID_CH.map(k=>({
    label:CH_META[k].label,
    data:months.map(m=>Math.round(byMonth[m].reduce((s,d)=>s+(d.media[k]||{spd:0}).spd,0)/1e6)),
    backgroundColor:CH_META[k].color+'cc'
  }));

  // ROAS 비교: 전체 매체 ROAS vs 전체 C24 ROAS
  const mRoasData=months.map(m=>{
    const spd=byMonth[m].reduce((s,d)=>s+PAID_CH.reduce((ss,k)=>ss+(d.media[k]||{spd:0}).spd,0),0);
    const rev=byMonth[m].reduce((s,d)=>s+PAID_CH.reduce((ss,k)=>ss+(d.media[k]||{rev:0}).rev,0),0);
    return Math.round(roas(spd,rev));
  });
  const cRoasData=months.map(m=>{
    const spd=byMonth[m].reduce((s,d)=>s+PAID_CH.reduce((ss,k)=>ss+(d.media[k]||{spd:0}).spd,0),0);
    const rev=byMonth[m].reduce((s,d)=>s+PAID_CH.reduce((ss,k)=>ss+(d.c24[k]||0),0),0);
    return Math.round(roas(spd,rev));
  });

  if(charts.spend)charts.spend.destroy();
  if(charts.roas)charts.roas.destroy();

  charts.spend=new Chart(document.getElementById('chart-spend'),{
    type:'bar',
    data:{labels:months.map(m=>m.slice(5)+'월'),datasets:spendDatasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},
      scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>v+'M'}}}}
  });

  charts.roas=new Chart(document.getElementById('chart-roas'),{
    type:'bar',
    data:{labels:months.map(m=>m.slice(5)+'월'),
      datasets:[
        {label:'매체 ROAS',data:mRoasData,backgroundColor:'#4466cccc'},
        {label:'Cafe24 ROAS',data:cRoasData,backgroundColor:'#4caf50cc'}
      ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},
      scales:{y:{ticks:{callback:v=>v+'%'}}}}
  });
}

// ═══════════════════════════════════════════════════════════════
// 7. EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════
document.querySelectorAll('[data-m]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-m]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeMonth=btn.dataset.m;
    if(rawDays.length)render();
  });
});
document.querySelectorAll('[data-view]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-view]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeView=btn.dataset.view;
    if(rawDays.length)render();
  });
});

// ═══════════════════════════════════════════════════════════════
// 8. INIT
// ═══════════════════════════════════════════════════════════════
document.querySelector('[data-m="all"]').classList.add('active');
document.querySelector('[data-view="monthly"]').classList.add('active');
loadMedia();
</script>
